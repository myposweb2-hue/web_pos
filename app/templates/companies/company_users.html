{% extends "base.html" %}

{% block title %}Company Users - {{ company.name }} - {{ app_name }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2><i class="fas fa-users me-2"></i>Users - {{ company.name }}</h2>
            <a href="/companies" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-1"></i> Back to Companies
            </a>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
            <i class="fas fa-plus me-1"></i> Add User
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover" id="usersTable">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Company Admin</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add User Modal -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add User to {{ company.name }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addUserForm">
                    <input type="hidden" name="company_id" value="{{ company.id }}">
                    <div class="mb-3">
                        <label class="form-label">User</label>
                        <select class="form-select" id="userSelect" required>
                            <option value="">Select a user...</option>
                            <!-- Loaded via JS -->
                        </select>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="isAdmin">
                        <label class="form-check-label" for="isAdmin">
                            Make Company Admin
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addUserToCompany()">Add User</button>
            </div>
        </div>
    </div>
</div>

<script>
var companyId = {{ company.id }};
var csrfToken = '{{ csrf_token() }}';

document.addEventListener('DOMContentLoaded', function() {
    loadUsers();
    loadAvailableUsers();
});

function loadUsers() {
    fetch(`/companies/api/companies/${companyId}/users`)
        .then(response => response.json())
        .then(users => {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            users.forEach(user => {
                tbody.innerHTML += `
                    <tr>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>
                            <span class="badge bg-${user.role === 'admin' || user.role === 'Super Admin' ? 'danger' : 'primary'}">${user.role}</span>
                        </td>
                        <td>
                            ${user.is_admin ? '<span class="badge bg-success">Yes</span>' : '<span class="badge bg-secondary">No</span>'}
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" onclick="removeUser(${user.id})">
                                <i class="fas fa-trash"></i> Remove
                            </button>
                        </td>
                    </tr>
                `;
            });
        })
        .catch(error => console.error('Error loading users:', error));
}

function loadAvailableUsers() {
    // Add user functionality requires endpoint for fetching available users
    // Currently uses server-rendered list or disable add functionality
    const select = document.getElementById('userSelect');
    select.innerHTML = '<option value="">Add User Coming Soon</option>';
    select.disabled = true;
    const modal = document.getElementById('addUserModal');
    modal.querySelector('.modal-title').textContent = 'Add User - Coming Soon';
}

function addUserToCompany() {
    const userId = document.getElementById('userSelect').value;
    const isAdmin = document.getElementById('isAdmin').checked;
    
    if (!userId) {
        alert('Please select a user');
        return;
    }
    
    fetch(`/companies/api/companies/${companyId}/users`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
        },
        body: JSON.stringify({ user_id: userId, is_admin: isAdmin })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
            loadUsers();
            loadAvailableUsers();
            showNotification(data.message, 'success');
        } else {
            alert(data.error || 'Failed to add user');
        }
    })
    .catch(error => {
        alert('Error: ' + error);
    });
}

function removeUser(userId) {
    if (!confirm('Remove this user from the company?')) return;
    
    fetch(`/companies/api/companies/${companyId}/users/${userId}`, {
        method: 'DELETE',
        headers: {
            'X-CSRFToken': csrfToken
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            loadUsers();
            showNotification(data.message, 'success');
        } else {
            alert(data.error || 'Failed to remove user');
        }
    })
    .catch(error => {
        alert('Error: ' + error);
    });
}
</script>
{% endblock %}
