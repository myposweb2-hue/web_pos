<div class="modal fade" id="companyUsersModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-users me-2"></i>Manage Users - <span id="modalCompanyName"></span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- Add User Section -->
                <div class="card mb-4">
                    <div class="card-header bg-light">
                        <h6 class="mb-0">Add User to Company</h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Select User *</label>
                                <select class="form-select" id="availableUsersSelect">
                                    <option value="">Choose a user...</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">&nbsp;</label>
                                <button type="button" class="btn btn-primary w-100" onclick="addUserToCompany()">
                                    <i class="fas fa-plus me-1"></i>Add User
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Current Users Section -->
                <div class="card">
                    <div class="card-header bg-light">
                        <h6 class="mb-0">Current Users</h6>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Company Admin</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="modalUsersTableBody">
                                <tr>
                                    <td colspan="5" class="text-center text-muted">Loading users...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<input type="hidden" id="currentCompanyId" value="">
