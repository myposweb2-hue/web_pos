version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pos_db
    environment:
      POSTGRES_DB: ${DB_NAME:-pos_db}
      POSTGRES_USER: ${DB_USER:-pos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "8025:8025"   # MailHog web UI
      - "1025:1025"   # SMTP port for apps
    networks:
      - pos_network

  web:
    build: .
    container_name: pos_app
    environment:
      DATABASE_URL: postgresql://${DB_USER:-pos_user}:${DB_PASSWORD:-secure_password}@db:5432/${DB_NAME:-pos_db}
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this}
      # Development default uses MailHog SMTP on localhost:1025 when FLASK_ENV=development
      MAIL_SERVER: ${MAIL_SERVER:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-False}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./instance:/app/instance
    networks:
      - pos_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pos_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/app/app/static:ro
    depends_on:
      - web
    networks:
      - pos_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  pos_network:
    driver: bridge
